<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Agent Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Manrope","Segoe UI",system-ui,sans-serif;background:#fff;overflow:hidden;height:504px;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.topbar{height:38px;flex-shrink:0;background:#F9FAFB;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;padding:0 14px;gap:10px}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tl-logo{height:16px;width:16px;object-fit:contain;flex-shrink:0}
.tl-name{font-size:11px;font-weight:700;color:#111827}
.topbar-url{flex:1;height:20px;background:#fff;border:1px solid #E5E7EB;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-family:"SF Mono","Fira Code",monospace;font-size:9px;color:#9CA3AF}
.topbar-status{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ts-dot{width:6px;height:6px;border-radius:50%;background:#D1D5DB;transition:background .3s ease,box-shadow .3s ease}
.ts-dot.building{background:#F59E0B;animation:pul-a .9s ease-in-out infinite}
.ts-dot.live{background:#22C55E;animation:pul-g 1.5s ease-in-out infinite}
@keyframes pul-a{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.35)}50%{box-shadow:0 0 0 4px rgba(245,158,11,0)}}
@keyframes pul-g{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.35)}50%{box-shadow:0 0 0 4px rgba(34,197,94,0)}}
.ts-label{font-size:9px;font-weight:700;color:#6B7280;font-family:"SF Mono","Fira Code",monospace;letter-spacing:.03em;transition:color .3s ease}
.body{flex:1;display:flex;overflow:hidden}
.left{width:42%;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border-right:1px solid #E5E7EB}
.left-hdr{height:32px;flex-shrink:0;background:#F9FAFB;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;padding:0 14px}
.left-hdr-lbl{font-size:9px;font-weight:700;color:#9CA3AF;letter-spacing:.07em;text-transform:uppercase;font-family:"SF Mono","Fira Code",monospace}
.left-body{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;overflow:hidden}
.prompt-label{font-size:11px;font-weight:600;color:#374151}
.prompt-box{background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:8px;padding:10px 12px;min-height:70px;display:flex;align-items:flex-start;flex-wrap:wrap;position:relative;transition:border-color .25s ease,background .25s ease}
.prompt-box.typing{border-color:#B0E8C8;background:#FAFFFE}
.prompt-text{font-size:12px;line-height:1.65;color:#111827;font-weight:500}
.cursor{font-size:14px;color:#2D6B4A;font-weight:700;animation:blink .85s step-end infinite;margin-left:1px;line-height:1.4}
.cursor.off{display:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.chips{display:flex;flex-direction:column;gap:5px;opacity:0;transition:opacity .35s ease}
.chips.vis{opacity:1}
.chip{padding:5px 9px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;font-size:10px;font-weight:600;color:#6B7280;cursor:default;display:flex;align-items:center;gap:5px}
.chip-icon{font-size:11px}
.build-wrap{margin-top:auto}
.build-btn{width:100%;height:36px;background:#009958;color:#fff;border:none;border-radius:8px;font-family:"Manrope","Segoe UI",system-ui,sans-serif;font-size:13px;font-weight:700;cursor:default;display:flex;align-items:center;justify-content:center;gap:7px;opacity:.35;transition:opacity .3s ease,box-shadow .2s ease,transform .12s ease}
.build-btn svg{width:11px;height:11px;fill:currentColor;flex-shrink:0}
.build-btn.ready{opacity:1}
.build-btn.clicked{transform:scale(.97);box-shadow:0 0 0 3px #B0E8C8}
.build-btn.done{opacity:1;background:#2D6B4A;box-shadow:none;transform:none}
.right{flex:1;display:flex;flex-direction:column;background:#F9FAFB;overflow:hidden}
.right-hdr{height:32px;flex-shrink:0;background:#F9FAFB;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;padding:0 14px;justify-content:space-between}
.right-hdr-title{font-size:11px;font-weight:700;color:#111827}
.r-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;background:#F3F4F6;border:1px solid #E5E7EB;transition:background .3s ease,border-color .3s ease}
.r-badge.building{background:#FEF9C3;border-color:#FDE68A}
.r-badge.live{background:#DCFCE7;border-color:#B0E8C8}
.rb-dot{width:5px;height:5px;border-radius:50%;background:#D1D5DB;transition:background .3s ease}
.rb-dot.building{background:#F59E0B;animation:pul-a .9s ease-in-out infinite}
.rb-dot.live{background:#22C55E}
.rb-txt{font-size:9px;font-weight:700;color:#6B7280;font-family:"SF Mono","Fira Code",monospace;letter-spacing:.03em;transition:color .3s ease}
.flow-area{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 14px;overflow:hidden}
.node-col{display:flex;flex-direction:column;align-items:center}
.nd{width:208px;height:36px;padding:0 10px;border-radius:8px;border:1.5px solid #E5E7EB;background:#fff;display:flex;align-items:center;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);flex-shrink:0;opacity:0;transform:translateY(6px) scale(.97);transition:opacity .4s cubic-bezier(0.34,1.56,0.64,1),transform .4s cubic-bezier(0.34,1.56,0.64,1),border-color .3s ease,box-shadow .3s ease}
.nd.vis{opacity:1;transform:translateY(0) scale(1)}
.nd.glow{border-color:#B0E8C8;box-shadow:0 0 0 3px #E8F7EF,0 1px 3px rgba(0,0,0,.05)}
.nd-icon{width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nd-icon svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nd-body{flex:1;min-width:0}
.nd-lbl{font-size:11px;font-weight:700;color:#111827;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nd-sub{font-size:9px;color:#6B7280;line-height:1;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nd-tag{font-size:8px;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0;white-space:nowrap;font-family:"SF Mono","Fira Code",monospace;letter-spacing:.02em}
.conn{width:2px;height:14px;background:#D1D5DB;flex-shrink:0;position:relative;overflow:visible;opacity:0;transition:opacity .2s ease}
.conn.vis{opacity:1}
.cdot{position:absolute;width:8px;height:8px;border-radius:50%;background:#00B368;left:-3px;top:-4px;opacity:0;box-shadow:0 0 6px rgba(0,179,104,.55)}
.cdot.run{animation:cdot-fall 1.1s ease-in-out forwards}
@keyframes cdot-fall{0%{top:-4px;opacity:1}80%{top:10px;opacity:1}100%{top:10px;opacity:0}}
.shell{opacity:1;transition:opacity .5s ease}
.shell.fade{opacity:0}
</style>
</head>
<body>
<div class="shell" id="shell">
  <div class="topbar">
    <div class="topbar-left">
      <img src="https://cdn.prod.website-files.com/69fd4b6acc037ef6b6caa7f9/6a06bceabf76a0279dc8f9cf_retainsure-icon.png" alt="RetainSure" class="tl-logo"/>
      <span class="tl-name">Agent Builder</span>
    </div>
    <div class="topbar-url">app.retainsure.com / agents / new</div>
    <div class="topbar-status">
      <div class="ts-dot" id="ts-dot"></div>
      <span class="ts-label" id="ts-label">Ready</span>
    </div>
  </div>
  <div class="body">
    <div class="left">
      <div class="left-hdr"><span class="left-hdr-lbl">Prompt</span></div>
      <div class="left-body">
        <div class="prompt-label">What should your agent do?</div>
        <div class="prompt-box" id="prompt-box">
          <span class="prompt-text" id="prompt-text"></span><span class="cursor" id="cursor">|</span>
        </div>
        <div class="chips" id="chips">
          <div class="chip"><span class="chip-icon">📊</span>QBR prep automation</div>
          <div class="chip"><span class="chip-icon">⚠️</span>Churn risk alerts</div>
          <div class="chip"><span class="chip-icon">📈</span>Upsell outreach</div>
        </div>
        <div class="build-wrap">
          <button class="build-btn" id="build-btn">
            <svg viewBox="0 0 12 12"><polygon points="2,1 11,6 2,11"/></svg>
            Build Agent
          </button>
        </div>
      </div>
    </div>
    <div class="right">
      <div class="right-hdr">
        <span class="right-hdr-title">Renewal Flow</span>
        <div class="r-badge" id="r-badge">
          <div class="rb-dot" id="rb-dot"></div>
          <span class="rb-txt" id="rb-txt">Waiting</span>
        </div>
      </div>
      <div class="flow-area">
        <div class="node-col" id="node-col"></div>
      </div>
    </div>
  </div>
</div>
<script>
const PROMPT = "Send renewal alerts 45 days before contract end";
const NODES = [
  {lbl:"Trigger",sub:"45 days before renewal",iconColor:"#3B82F6",iconBg:"#EFF6FF",tag:"Schedule",tagColor:"#3B82F6",tagBg:"#DBEAFE",
   svg:'<path d="M8 2a6 6 0 1 0 0 12A6 6 0 0 0 8 2zm0 2.5v3.2l2.2 1.3"/>'},
  {lbl:"Filter",sub:"Health score < 70",iconColor:"#7C3AED",iconBg:"#F5F3FF",tag:"Condition",tagColor:"#7C3AED",tagBg:"#EDE9FE",
   svg:'<path d="M2 4h12M4 8h8M6 12h4"/>'},
  {lbl:"Generate message",sub:"AI-crafted, personalised",iconColor:"#2D6B4A",iconBg:"#E8F7EF",tag:"AI",tagColor:"#2D6B4A",tagBg:"#D1FAE5",
   svg:'<path d="M8 2l1.5 3L13 6.5 10 9l1 3.5L8 10.5 5 12.5l1-3.5L3 6.5 6.5 5z"/>'},
  {lbl:"Send to Slack",sub:"#cs-alerts channel",iconColor:"#4A154B",iconBg:"#F9F0FF",tag:"Deliver",tagColor:"#4A154B",tagBg:"#F3E8FF",
   svg:'<path d="M2 5h8a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5l-3 2V5z"/>'},
  {lbl:"Agent Active",sub:"Running on 32 accounts",iconColor:"#16A34A",iconBg:"#DCFCE7",tag:"Live",tagColor:"#16A34A",tagBg:"#BBF7D0",glow:true,
   svg:'<polyline points="2,8 6,12 14,4"/>'},
];

function buildNodeEl(n,idx){
  const div=document.createElement('div');
  div.className='nd';
  div.id='nd'+idx;
  div.innerHTML=`<div class="nd-icon" style="background:${n.iconBg};color:${n.iconColor}"><svg viewBox="0 0 16 16">${n.svg}</svg></div><div class="nd-body"><div class="nd-lbl">${n.lbl}</div><div class="nd-sub">${n.sub}</div></div><div class="nd-tag" style="color:${n.tagColor};background:${n.tagBg}">${n.tag}</div>`;
  return div;
}
function buildConnEl(idx){
  const div=document.createElement('div');
  div.className='conn';
  div.id='cn'+idx;
  div.innerHTML='<div class="cdot" id="cd'+idx+'"></div>';
  return div;
}

// Build DOM
const col=document.getElementById('node-col');
NODES.forEach((n,i)=>{
  col.appendChild(buildNodeEl(n,i));
  if(i<NODES.length-1)col.appendChild(buildConnEl(i));
});

const T=[];
const s=(fn,d)=>T.push(setTimeout(fn,d));
const wait=ms=>new Promise(r=>s(r,ms));

function reset(){
  T.forEach(clearTimeout);T.length=0;
  document.getElementById('prompt-text').textContent='';
  document.getElementById('cursor').classList.remove('off');
  document.getElementById('prompt-box').classList.remove('typing');
  document.getElementById('chips').classList.remove('vis');
  const btn=document.getElementById('build-btn');
  btn.classList.remove('ready','clicked','done');
  document.getElementById('ts-dot').className='ts-dot';
  document.getElementById('ts-label').textContent='Ready';
  document.getElementById('ts-label').style.color='';
  const badge=document.getElementById('r-badge');
  badge.className='r-badge';
  document.getElementById('rb-dot').className='rb-dot';
  document.getElementById('rb-txt').textContent='Waiting';
  NODES.forEach((_,i)=>{
    const nd=document.getElementById('nd'+i);
    if(nd){nd.classList.remove('vis','glow');}
    if(i<NODES.length-1){
      const cn=document.getElementById('cn'+i);
      if(cn)cn.classList.remove('vis');
      const cd=document.getElementById('cd'+i);
      if(cd)cd.classList.remove('run');
    }
  });
  document.getElementById('shell').classList.remove('fade');
}

async function run(){
  reset();
  await wait(350);

  // Type prompt
  const promptEl=document.getElementById('prompt-text');
  const promptBox=document.getElementById('prompt-box');
  promptBox.classList.add('typing');
  for(let i=0;i<=PROMPT.length;i++){
    await wait(i===0?0:26);
    promptEl.textContent=PROMPT.slice(0,i);
  }

  // Show chips
  await wait(250);
  document.getElementById('chips').classList.add('vis');
  await wait(300);

  // Button ready
  document.getElementById('cursor').classList.add('off');
  const btn=document.getElementById('build-btn');
  btn.classList.add('ready');
  await wait(250);

  // Button click
  btn.classList.add('clicked');
  await wait(180);
  btn.classList.remove('clicked');
  btn.classList.add('done');

  // Status → building
  await wait(100);
  const dot=document.getElementById('ts-dot');
  dot.className='ts-dot building';
  document.getElementById('ts-label').textContent='Building';
  document.getElementById('ts-label').style.color='#F59E0B';
  const badge=document.getElementById('r-badge');
  badge.className='r-badge building';
  document.getElementById('rb-dot').className='rb-dot building';
  document.getElementById('rb-txt').textContent='Building...';

  // Build nodes
  for(let i=0;i<NODES.length;i++){
    await wait(i===0?150:350);
    const nd=document.getElementById('nd'+i);
    if(nd)nd.classList.add('vis');
    if(i<NODES.length-1){
      await wait(180);
      const cn=document.getElementById('cn'+i);
      if(cn)cn.classList.add('vis');
      const cd=document.getElementById('cd'+i);
      if(cd)cd.classList.add('run');
    }
  }

  // Glow last node + go live
  await wait(220);
  const last=document.getElementById('nd'+(NODES.length-1));
  if(last)last.classList.add('glow');
  dot.className='ts-dot live';
  document.getElementById('ts-label').textContent='Live';
  document.getElementById('ts-label').style.color='#16A34A';
  badge.className='r-badge live';
  document.getElementById('rb-dot').className='rb-dot live';
  document.getElementById('rb-txt').textContent='Active';

  // Hold then fade
  await wait(900);
  document.getElementById('shell').classList.add('fade');
  await wait(550);

  // Signal completion to parent tab system
  try{window.parent.postMessage('visual-done','*');}catch(e){}

  await wait(300);
  run();
}

run();
</script>
</body>
</html>
